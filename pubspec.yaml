name: pressfit
description: "PressFit - App de seguimiento de entrenamientos y rutinas fitness"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Supabase
  supabase_flutter: ^2.9.0

  # Navigation
  go_router: ^14.8.1

  # State Management
  provider: ^6.1.5

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Charts
  fl_chart: ^0.70.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
